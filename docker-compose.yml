services:
  postgres:
    image: postgres:16-alpine
    profiles: ["app"]
    environment:
      POSTGRES_DB: customization_audit
      POSTGRES_USER: customization_audit
      POSTGRES_PASSWORD: customization_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customization_audit -d customization_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/customization_audit
      DATABASE_USERNAME: customization_audit
      DATABASE_PASSWORD: customization_audit
      OAUTH2_ISSUER_URI: http://localhost:8081/realms/customization-audit
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    profiles: ["app"]
    ports:
      - "4200:4200"
    depends_on:
      - backend

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-codex-team-agent:local
    container_name: docker-codex-team-coordinator
    profiles: ["agents"]
    working_dir: /workspace
    environment:
      AGENT_NAME: coordinator
      CODEX_HOME: /codex-home
      CODEX_SANDBOX: danger-full-access
      CODEX_APPROVAL_POLICY: on-request
    volumes:
      - .:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home
    command: ["coordinator"]
    stdin_open: true
    tty: true

  architect:
    image: docker-codex-team-agent:local
    profiles: ["agents"]
    working_dir: /workspace
    environment:
      AGENT_NAME: architect
      CODEX_HOME: /codex-home
      CODEX_SANDBOX: danger-full-access
      CODEX_APPROVAL_POLICY: on-request
    volumes:
      - .:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home
    command: ["architect"]
    stdin_open: true
    tty: true

  backend_dev:
    image: docker-codex-team-agent:local
    profiles: ["agents"]
    working_dir: /workspace
    environment:
      AGENT_NAME: backend_dev
      CODEX_HOME: /codex-home
      CODEX_SANDBOX: danger-full-access
      CODEX_APPROVAL_POLICY: on-request
    volumes:
      - .:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home
    command: ["backend_dev"]
    stdin_open: true
    tty: true

  frontend_dev:
    image: docker-codex-team-agent:local
    profiles: ["agents"]
    working_dir: /workspace
    environment:
      AGENT_NAME: frontend_dev
      CODEX_HOME: /codex-home
      CODEX_SANDBOX: danger-full-access
      CODEX_APPROVAL_POLICY: on-request
    volumes:
      - .:/workspace
      - ${CODEX_HOME:-$HOME/.codex}:/codex-home
    command: ["frontend_dev"]
    stdin_open: true
    tty: true

volumes:
  postgres-data:
